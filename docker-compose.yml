services:

  # ── Storage ────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5

  # ── Metadata DB ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: ragdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "rag"]
      interval: 10s
      retries: 5

  # ── Vector DB ──────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      retries: 5

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-auto}
      - AI_BASE_URL=${AI_BASE_URL-}
      - AI_API_KEY=${AI_API_KEY:-sk-placeholder}
      - EMBED_MODEL=${EMBED_MODEL:-text-embedding-3-small}
      - VISION_MODEL=${VISION_MODEL:-gpt-4o}
      - DATABASE_URL=postgresql://rag:rag@postgres:5432/ragdb
      - VECTOR_STORE=qdrant
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - USE_S3=true
      - S3_BUCKET=rag-pipeline-local
      - S3_ENDPOINT=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ── Test runner ────────────────────────────────────────────────────────────
  test:
    build:
      context: .
      dockerfile: docker/Dockerfile.test
    environment:
      - AI_PROVIDER=mock
      - VECTOR_STORE=memory
      - METADATA_STORE=memory
    command: ["pytest", "-q", "-m", "not integration and not qdrant and not minio"]

volumes:
  minio_data:
  postgres_data:
  qdrant_data:
