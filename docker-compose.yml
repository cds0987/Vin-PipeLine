services:

  # ── Storage ────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  # ── Metadata DB ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: ragdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "rag"]
      interval: 10s
      retries: 5

  # ── Vector DB ──────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-auto}
      - AI_BASE_URL=${AI_BASE_URL-}
      - AI_API_KEY=${AI_API_KEY:-sk-placeholder}
      - EMBED_MODEL=${EMBED_MODEL:-text-embedding-3-small}
      - VISION_MODEL=${VISION_MODEL:-gpt-4o}
      - DATABASE_URL=postgresql://rag:rag@postgres:5432/ragdb
      - VECTOR_STORE=qdrant
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - USE_S3=true
      - S3_BUCKET=rag-pipeline-local
      - MARKDOWN_BUCKET=${MARKDOWN_BUCKET:-rag-pipeline-local}
      - MARKDOWN_S3_PREFIX=${MARKDOWN_S3_PREFIX:-rag-derived/markdown}
      - S3_ENDPOINT=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - SECTION_FALLBACK_MAX_CHARS=${SECTION_FALLBACK_MAX_CHARS:-2400}
      - SECTION_FALLBACK_PARAGRAPHS=${SECTION_FALLBACK_PARAGRAPHS:-3}
      - CAPTION_MAX_CHARS=${CAPTION_MAX_CHARS:-280}
      - CAPTION_MODEL=${CAPTION_MODEL:-heuristic}
      - PARSER_VERSION=${PARSER_VERSION:-pipeline.parsers.v1}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ── Test runner ────────────────────────────────────────────────────────────
  test:
    build:
      context: .
      dockerfile: docker/Dockerfile.test
    environment:
      # AI: use real credentials from .env when available, fall back to mock
      - AI_PROVIDER=${AI_PROVIDER:-mock}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - EMBED_MODEL=${EMBED_MODEL:-text-embedding-3-small}
      - VISION_MODEL=${VISION_MODEL:-gpt-4o}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-32}
      # Infrastructure — fixed for test environment
      - VECTOR_STORE=qdrant
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION=ci-docker-test
      - METADATA_STORE=memory
      - USE_S3=false
      - MARKDOWN_S3_PREFIX=${MARKDOWN_S3_PREFIX:-rag-derived/markdown}
      - CAPTION_MODEL=${CAPTION_MODEL:-heuristic}
      - PARSER_VERSION=${PARSER_VERSION:-pipeline.parsers.v1}
      - MINIO_TEST_ENDPOINT=http://minio:9000
      - MINIO_TEST_BUCKET=rag-pipeline-local
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    depends_on:
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["pytest", "-q", "-m", "not integration"]

volumes:
  minio_data:
  postgres_data:
  qdrant_data:
