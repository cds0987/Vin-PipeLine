[pytest]
markers =
    integration: end-to-end tests that require external services
    qdrant: tests that require a live Qdrant instance
    minio: tests that require a live MinIO instance
    e2e: tests that require both MinIO and Qdrant simultaneously (docker-compose only)
addopts = -m "not integration and not qdrant and not minio and not e2e"
