apiVersion: apps/v1
kind: Deployment
metadata:
  name: vin-pipeline-api
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vin-pipeline-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: vin-pipeline-api
    spec:
      # Run DB migration before the API container starts.
      # If migration fails, the pod will not start → deploy fails safely.
      initContainers:
        - name: db-migrate
          image: asia-southeast1-docker.pkg.dev/vintravel-chatbot/vin-pipeline/api:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: vin-pipeline-config
            - secretRef:
                name: vin-pipeline-secret
      containers:
        - name: api
          image: asia-southeast1-docker.pkg.dev/vintravel-chatbot/vin-pipeline/api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: vin-pipeline-config
            - secretRef:
                name: vin-pipeline-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: vin-pipeline-api
  namespace: default
spec:
  selector:
    app: vin-pipeline-api
  ports:
    - port: 80
      targetPort: 8000
  type: LoadBalancer
