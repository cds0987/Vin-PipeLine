apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

# Image tag is patched by CI via: kustomize edit set image api=...:$SHA
# Never edit this line manually — it is updated automatically on each deploy.
images:
  - name: api
    newName: asia-southeast1-docker.pkg.dev/vintravel-chatbot/vin-pipeline/api
    newTag: latest
