name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Path detection ─────────────────────────────────────────────────────────────
# CI has no knowledge of internal directory structure.
# Any .py change or infra change triggers the right jobs.

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      k8s:  ${{ steps.filter.outputs.k8s }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.py'
              - 'requirements*.txt'
              - 'docker/**'
              - 'Makefile'
              - '.env.ci'
            k8s:
              - 'k8s/**'
              - 'Makefile'

  # ── Unit tests (always) ───────────────────────────────────────────────────────
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Load CI env
        run: grep -v '^#' .env.ci >> $GITHUB_ENV
      - run: make test

  # ── Docker full-stack test (only when code changes) ───────────────────────────
  docker-test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Load CI env
        run: grep -v '^#' .env.ci >> $GITHUB_ENV
      - run: make docker-test

  # ── Qdrant integration (not fork PRs) ─────────────────────────────────────────
  qdrant-integration:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      VECTOR_STORE: qdrant
      QDRANT_URL: https://4a17666f-23ca-4555-9a16-ba7867005326.us-east-1-1.aws.cloud.qdrant.io
      QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
      QDRANT_COLLECTION: ci-integration-test
      EMBEDDING_DIM: "32"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Load CI env
        run: grep -v '^#' .env.ci >> $GITHUB_ENV
      - run: pytest -m "qdrant and not e2e" -v

  # ── MinIO integration (not fork PRs) ──────────────────────────────────────────
  minio-integration:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      MINIO_TEST_ENDPOINT: http://localhost:9000
      MINIO_TEST_BUCKET: rag-pipeline-local
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    steps:
      - uses: actions/checkout@v4
      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          until curl -sf http://localhost:9000/minio/health/live; do sleep 1; done
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Load CI env
        run: grep -v '^#' .env.ci >> $GITHUB_ENV
      - run: pytest -m "minio and not e2e" -v

  # ── Deploy (main only, after tests pass) ──────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [pytest, docker-test, changes]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.pytest.result == 'success' &&
      (needs.docker-test.result == 'success' || needs.docker-test.result == 'skipped') &&
      (needs.changes.outputs.code == 'true' || needs.changes.outputs.k8s == 'true')
    permissions:
      contents: read
      id-token: write
    env:
      USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/289299478169/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@vintravel-chatbot.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'gke-gcloud-auth-plugin'

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials vin-pipeline \
            --zone asia-southeast1-a --project vintravel-chatbot

      - name: Apply secret
        run: |
          make apply-secret \
            DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            QDRANT_API_KEY="${{ secrets.QDRANT_API_KEY }}" \
            AI_API_KEY="${{ secrets.AI_API_KEY }}" \
            AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            S3_ENDPOINT="${{ secrets.S3_ENDPOINT }}" \
            S3_BUCKET="${{ secrets.S3_BUCKET }}"

      - name: Build & push image
        # Build whenever we deploy (code OR k8s changes) so the image for this
        # SHA always exists — `make deploy SHA=...` pins that exact tag.
        if: needs.changes.outputs.code == 'true' || needs.changes.outputs.k8s == 'true'
        run: |
          gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet
          make push SHA=${{ github.sha }}

      - name: Deploy
        run: make deploy SHA=${{ github.sha }}
